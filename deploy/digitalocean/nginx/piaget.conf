upstream piaget_gunicorn {
    server unix:/run/piaget/gunicorn.sock fail_timeout=0;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 67.205.138.3;

    client_max_body_size 20M;

    location /media/ {
        alias /var/www/piaget/app/media/;
    }

    location /static/ {
        alias /var/www/piaget/app/staticfiles/;
    }

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_pass http://piaget_gunicorn;
    }
}
