{% extends "base.html" %}
{% block title %}Logros · jean piaget IA{% endblock %}
{% block content %}
<section class="container py-4 cuenta-page">
  <header class="cuenta-page__head">
    <span class="cuenta-page__icon" aria-hidden="true">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2.5 14.2 8l5.8.5-4.4 3.8 1.4 5.7L12 15.8 6.9 18l1.4-5.7L4 8.5 9.8 8 12 2.5Z"/></svg>
    </span>
    <div>
      <h1>Logros</h1>
      <p class="lead">Tus medallas y reconocimientos{% if inscrito %}, {{ inscrito.nombres }}{% endif %}.</p>
    </div>
  </header>
  <p class="cuenta-page__empty">Aún no hay logros desbloqueados. ¡Sigue aprendiendo!</p>
  <p><a class="btn" href="{% url 'sin_limites' %}">Volver a Sin limites</a></p>
</section>
{% endblock %}
